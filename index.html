<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeet Parmar | Flutter Developer</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
  background:#020617;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
header{
  position:fixed;width:100%;
  background:rgba(2,6,23,0.7);
  backdrop-filter:blur(10px);
  z-index:1000;
}
nav{
  display:flex;justify-content:space-between;
  padding:12px 16px;max-width:1200px;margin:auto;
}
.logo{color:#8b5cf6;font-weight:bold;}
.nav-links{display:flex;gap:15px;list-style:none;}
.nav-links a{color:#cbd5f5;text-decoration:none;}

/* HERO */
.hero{
  height:100vh;
  display:flex;justify-content:center;align-items:center;
  text-align:center;
}
.hero span{color:#8b5cf6;}
.btn{
  padding:12px 22px;
  border-radius:30px;
  background:linear-gradient(135deg,#8b5cf6,#6366f1);
  color:white;
  text-decoration:none;
}

/* SECTION */
section{padding:80px 20px;}
.container{max-width:1200px;margin:auto;}
h2{text-align:center;margin-bottom:30px;}

/* CAROUSEL */
.carousel{
  display:flex;
  gap:25px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  padding:20px;
}

.carousel::-webkit-scrollbar{display:none;}

/* CARD */
.app-card{
  min-width:260px;
  height:460px;
  background:rgba(255,255,255,0.05);
  border-radius:25px;
  padding:12px;
  scroll-snap-align:center;
  transition:0.4s;
  transform-style:preserve-3d;
  cursor:pointer;
}

.app-card img{
  width:100%;
  height:380px;
  object-fit:cover;
  border-radius:20px;
}

.app-card h3{margin-top:10px;font-size:16px;}
.app-card p{font-size:12px;color:#aaa;}

/* 3D hover */
.app-card:hover{
  transform:rotateY(10deg) scale(1.08);
}

/* center zoom */
.app-card.active{
  transform:scale(1.15);
}

/* SLIDER */
#slider{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000;
  z-index:9999;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#slider img{
  max-width:90%;
  max-height:80%;
  border-radius:10px;
}

.slider-controls{
  margin-top:10px;
}
.slider-controls button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* MOBILE */
@media(max-width:768px){
  .nav-links{display:none;}
}
</style>
</head>

<body>

<header>
<nav>
<div class="logo">Jeet Parmar</div>
<ul class="nav-links">
<li><a href="#projects">Projects</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div>
<h1>Hi, I'm <span>Jeet</span> 👋</h1>
<p>Flutter Developer 🚀</p>
<a href="#projects" class="btn">View Work</a>
</div>
</section>

<!-- PROJECTS -->
<section id="projects">
<div class="container">

<h2>My Apps</h2>

<div class="carousel" id="carousel">

<!-- TODO APP -->
<div class="app-card" onclick="openSlider('todo')">
<img src="assets/images/todo/login.png">
<h3>Todo App</h3>
<p>Realtime + Offline Sync</p>
</div>

<!-- VIDEO CALL APP -->
<div class="app-card" onclick="openSlider('video')">
<img src="assets/images/video/login.png">
<h3>Video Call App</h3>
<p>Realtime Calling • Channel Based</p>
</div>

</div>

</div>
</section>

<!-- SLIDER -->
<div id="slider">
<img id="sliderImg">
<div class="slider-controls">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
<button onclick="closeSlider()">❌</button>
</div>
</div>

<!-- CONTACT -->
<section id="contact">
<div class="container" style="text-align:center;">
<h2>Contact</h2>
<p>jeet.mobiledeveloper@gmail.com</p>
</div>
</section>

<script>

/* AUTO SCROLL */
const carousel=document.getElementById("carousel");

setInterval(()=>{
carousel.scrollBy({left:300,behavior:'smooth'});
},3000);

/* CENTER ACTIVE */
carousel.addEventListener("scroll",()=>{
let cards=document.querySelectorAll(".app-card");
cards.forEach(c=>c.classList.remove("active"));

let center=window.innerWidth/2;
cards.forEach(card=>{
let rect=card.getBoundingClientRect();
if(rect.left<center && rect.right>center){
card.classList.add("active");
}
});
});

/* DATA */
let data={
todo:[
"assets/images/todo/login.png",
"assets/images/todo/register.png",
"assets/images/todo/task.png",
"assets/images/todo/add-task.png",
"assets/images/todo/edit-task.png",
"assets/images/todo/delete-task.png",
"assets/images/todo/mask-task-options.png",
"assets/images/todo/task-list.png"
],
video:[
"assets/images/video/login.png",
"assets/images/video/users.png",
"assets/images/video/userDetails.png",
"assets/images/video/video.png",
"assets/images/video/video-1.png",
"assets/images/video/error.png"
]
};

let list=[],index=0;

function openSlider(type){
list=data[type];
index=0;
document.getElementById("slider").style.display="flex";
show();
}

function show(){
document.getElementById("sliderImg").src=list[index];
}

function next(){
index=(index+1)%list.length;
show();
}

function prev(){
index=(index-1+list.length)%list.length;
show();
}

function closeSlider(){
document.getElementById("slider").style.display="none";
}

</script>

</body>
</html>
